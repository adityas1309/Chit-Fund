<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="Wallet connected state with XLM balance">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f6f3"/>
      <stop offset="1" stop-color="#eeece6"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="0%" r="60%">
      <stop offset="0" stop-color="#f49a16" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f49a16" stop-opacity="0"/>
    </radialGradient>
    <filter id="lift" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect x="160" y="-80" width="960" height="320" fill="url(#halo)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1280" height="64" fill="#f7f6f3" fill-opacity="0.85"/>
  <line x1="0" y1="64" x2="1280" y2="64" stroke="#d9d5c9" stroke-opacity="0.6"/>
  <g transform="translate(80 24)">
    <rect width="32" height="32" rx="10" fill="#0d0b06"/>
    <circle cx="16" cy="16" r="7" fill="none" stroke="#f7f6f3" stroke-width="2"/>
    <circle cx="16" cy="16" r="2" fill="#f49a16"/>
    <text x="44" y="22" font-family="Fraunces, Inter, serif" font-size="18" font-weight="600" fill="#0d0b06">Susu</text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#423c2e">
    <rect x="700" y="20" width="92" height="32" rx="10" fill="#0d0b06"/>
    <text x="746" y="40" text-anchor="middle" fill="#f7f6f3">Overview</text>
    <text x="820" y="40">Circles</text>
    <text x="900" y="40">Create</text>
  </g>
  <g transform="translate(1024 22)">
    <rect width="86" height="28" rx="14" fill="#ffffff" stroke="#d9d5c9"/>
    <circle cx="14" cy="14" r="4" fill="#3e7a2e"/>
    <text x="26" y="18" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" letter-spacing="0.6" fill="#423c2e">TESTNET</text>
  </g>

  <!-- Connected button (open menu) -->
  <g transform="translate(1100 20)">
    <rect width="140" height="36" rx="10" fill="#ffffff" stroke="#d9d5c9"/>
    <circle cx="16" cy="18" r="4" fill="#3e7a2e"/>
    <text x="28" y="22" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#0d0b06">GABCD…XYZ</text>
    <rect x="76" y="9" width="50" height="18" rx="9" fill="#eeece6" stroke="#d9d5c9"/>
    <text x="101" y="22" font-family="Inter, sans-serif" font-size="9" font-weight="700" letter-spacing="1.0" fill="#423c2e" text-anchor="middle">FREIGHTER</text>
  </g>

  <!-- Wallet menu dropdown -->
  <g transform="translate(900 60)" filter="url(#lift)">
    <rect width="340" height="332" rx="14" fill="#ffffff" stroke="#d9d5c9"/>
    <line x1="0" y1="100" x2="340" y2="100" stroke="#eeece6"/>
    <line x1="0" y1="200" x2="340" y2="200" stroke="#eeece6"/>

    <!-- Connected section -->
    <text x="20" y="28" font-family="Inter, sans-serif" font-size="10" font-weight="700" letter-spacing="1.6" fill="#615a48">CONNECTED</text>
    <text x="20" y="56" font-family="JetBrains Mono, monospace" font-size="12" fill="#0d0b06">GABCD3KMZY6BSJLZQDS2R3U3JXBPSX2F4H7ZQZQZQZQZQZQZQZQZQ</text>
    <g transform="translate(20 70)">
      <rect width="80" height="20" rx="10" fill="#eef7ec" stroke="#aed7a1"/>
      <circle cx="12" cy="10" r="3" fill="#3e7a2e"/>
      <text x="22" y="14" font-family="Inter, sans-serif" font-size="10" font-weight="700" letter-spacing="1.0" fill="#23471a">TESTNET</text>
      <rect x="90" width="80" height="20" rx="10" fill="#eeece6" stroke="#d9d5c9"/>
      <text x="130" y="14" font-family="Inter, sans-serif" font-size="10" font-weight="700" letter-spacing="1.0" fill="#423c2e" text-anchor="middle">FREIGHTER</text>
    </g>

    <!-- Balance section -->
    <g transform="translate(20 120)">
      <text font-family="Inter, sans-serif" font-size="10" font-weight="700" letter-spacing="1.6" fill="#615a48">XLM BALANCE</text>
      <text x="300" font-family="Inter, sans-serif" font-size="10" font-weight="700" letter-spacing="1.2" fill="#b35e02" text-anchor="end">REFRESH</text>
      <text y="36" font-family="Fraunces, Inter, serif" font-size="28" font-weight="600" fill="#0d0b06">9,999.8234 XLM</text>
      <text y="60" font-family="Inter, sans-serif" font-size="10" fill="#615a48">99998234000 stroops · 2 subentries</text>
    </g>

    <!-- Disconnect -->
    <g transform="translate(8 220)">
      <rect width="324" height="40" rx="10" fill="#f7f6f3"/>
      <text x="20" y="25" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#2a2519">Disconnect</text>
    </g>

    <!-- Pointer / annotation -->
  </g>

  <!-- Annotation -->
  <path d="M 980 100 L 900 240" stroke="#f49a16" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
  <g transform="translate(560 240)">
    <rect width="320" height="74" rx="10" fill="#0d0b06"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="1.4" fill="#f49a16">LEVEL 1 — XLM BALANCE</text>
    <text x="14" y="42" font-family="Inter, sans-serif" font-size="11" fill="#f7f6f3">Fetched from Horizon /accounts/{pk}</text>
    <text x="14" y="58" font-family="Inter, sans-serif" font-size="11" fill="#f7f6f3">Updated on connect, refresh, and disconnect</text>
  </g>
</svg>
