<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="Balance displayed in UI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f6f3"/>
      <stop offset="1" stop-color="#eeece6"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Header / chrome -->
  <rect x="0" y="0" width="1280" height="64" fill="#f7f6f3" fill-opacity="0.85"/>
  <line x1="0" y1="64" x2="1280" y2="64" stroke="#d9d5c9" stroke-opacity="0.6"/>
  <g transform="translate(80 24)">
    <rect width="32" height="32" rx="10" fill="#0d0b06"/>
    <circle cx="16" cy="16" r="7" fill="none" stroke="#f7f6f3" stroke-width="2"/>
    <circle cx="16" cy="16" r="2" fill="#f49a16"/>
    <text x="44" y="22" font-family="Fraunces, Inter, serif" font-size="18" font-weight="600" fill="#0d0b06">Susu</text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#423c2e">
    <text x="700" y="40">Overview</text>
    <rect x="780" y="20" width="76" height="32" rx="10" fill="#0d0b06"/>
    <text x="818" y="40" text-anchor="middle" fill="#f7f6f3">Circles</text>
    <text x="876" y="40">Create</text>
  </g>
  <g transform="translate(1024 22)">
    <rect width="86" height="28" rx="14" fill="#ffffff" stroke="#d9d5c9"/>
    <circle cx="14" cy="14" r="4" fill="#3e7a2e"/>
    <text x="26" y="18" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" letter-spacing="0.6" fill="#423c2e">TESTNET</text>
  </g>
  <g transform="translate(1100 20)">
    <rect width="140" height="36" rx="10" fill="#ffffff" stroke="#d9d5c9"/>
    <circle cx="16" cy="18" r="4" fill="#3e7a2e"/>
    <text x="28" y="22" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#0d0b06">GABCD…XYZ</text>
    <rect x="76" y="9" width="50" height="18" rx="9" fill="#eeece6" stroke="#d9d5c9"/>
    <text x="101" y="22" font-family="Inter, sans-serif" font-size="9" font-weight="700" letter-spacing="1.0" fill="#423c2e" text-anchor="middle">FREIGHTER</text>
  </g>

  <!-- Page title -->
  <text x="80" y="140" font-family="Inter, sans-serif" font-size="13" fill="#615a48">Circles / <tspan font-family="JetBrains Mono, monospace" fill="#423c2e">#0</tspan></text>
  <text x="80" y="190" font-family="Fraunces, Inter, serif" font-size="36" font-weight="600" fill="#0d0b06">4-seat circle · <tspan fill="#615a48">10 XLM/round</tspan></text>

  <!-- State badge -->
  <g transform="translate(80 220)">
    <rect width="86" height="28" rx="14" fill="#eef7ec" stroke="#aed7a1"/>
    <circle cx="14" cy="14" r="4" fill="#3e7a2e">
      <animate attributeName="opacity" values="1;0.55;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="26" y="18" font-family="Inter, sans-serif" font-size="10" font-weight="700" letter-spacing="1.0" fill="#23471a">ACTIVE</text>
    <text x="64" y="18" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#23471a">Live</text>
  </g>

  <!-- Tiles row -->
  <g transform="translate(80 280)">
    <rect width="356" height="84" rx="14" fill="#f7f6f3" stroke="#d9d5c9"/>
    <text x="16" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" letter-spacing="1.4" fill="#615a48">XLM BALANCE</text>
    <text x="16" y="58" font-family="Fraunces, Inter, serif" font-size="28" font-weight="600" fill="#0d0b06">9,999.8234 XLM</text>
    <text x="16" y="76" font-family="Inter, sans-serif" font-size="10" fill="#615a48">From Horizon /accounts/GABCD…XYZ</text>
  </g>

  <g transform="translate(456 280)">
    <rect width="356" height="84" rx="14" fill="#f7f6f3" stroke="#d9d5c9"/>
    <text x="16" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" letter-spacing="1.4" fill="#615a48">NEXT DEADLINE</text>
    <text x="16" y="58" font-family="Fraunces, Inter, serif" font-size="28" font-weight="600" fill="#0d0b06">~ 4m 12s</text>
    <text x="16" y="76" font-family="Inter, sans-serif" font-size="10" fill="#615a48">Ledger 4_421_312 · auto-refresh every 30s</text>
  </g>

  <g transform="translate(832 280)">
    <rect width="368" height="84" rx="14" fill="#f7f6f3" stroke="#d9d5c9"/>
    <text x="16" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" letter-spacing="1.4" fill="#615a48">MEMBERS</text>
    <text x="16" y="58" font-family="Fraunces, Inter, serif" font-size="28" font-weight="600" fill="#0d0b06">4 / 4 joined</text>
    <text x="16" y="76" font-family="Inter, sans-serif" font-size="10" fill="#615a48">Round 1 · 3 deposited · 1 outstanding</text>
  </g>

  <!-- Members card -->
  <g transform="translate(80 384)">
    <rect width="1116" height="120" rx="14" fill="#ffffff" stroke="#d9d5c9"/>
    <text x="20" y="32" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0d0b06">Members</text>
    <text x="1096" y="32" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.0" fill="#615a48" text-anchor="end">4 JOINED</text>
    <line x1="20" y1="48" x2="1096" y2="48" stroke="#eeece6"/>

    <g transform="translate(20 60)">
      <circle cx="14" cy="14" r="14" fill="#d6ecd0" stroke="#aed7a1"/>
      <text x="14" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#23471a" text-anchor="middle">1</text>
      <text x="38" y="14" font-family="JetBrains Mono, monospace" font-size="12" fill="#0d0b06">GABCD…XX1</text>
      <text x="38" y="30" font-family="Inter, sans-serif" font-size="11" fill="#3e7a2e">✓ Deposited</text>
    </g>
    <g transform="translate(280 60)">
      <circle cx="14" cy="14" r="14" fill="#d6ecd0" stroke="#aed7a1"/>
      <text x="14" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#23471a" text-anchor="middle">2</text>
      <text x="38" y="14" font-family="JetBrains Mono, monospace" font-size="12" fill="#0d0b06">GABCD…XX2</text>
      <text x="38" y="30" font-family="Inter, sans-serif" font-size="11" fill="#3e7a2e">✓ Deposited</text>
    </g>
    <g transform="translate(540 60)">
      <circle cx="14" cy="14" r="14" fill="#d6ecd0" stroke="#aed7a1"/>
      <text x="14" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#23471a" text-anchor="middle">3</text>
      <text x="38" y="14" font-family="JetBrains Mono, monospace" font-size="12" fill="#0d0b06">GABCD…XX3</text>
      <text x="38" y="30" font-family="Inter, sans-serif" font-size="11" fill="#3e7a2e">✓ Deposited</text>
    </g>
    <g transform="translate(800 60)">
      <circle cx="14" cy="14" r="14" fill="#f9dcd1" stroke="#e48266"/>
      <text x="14" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#652515" text-anchor="middle">4</text>
      <text x="38" y="14" font-family="JetBrains Mono, monospace" font-size="12" fill="#0d0b06">GABCD…XX4</text>
      <text x="38" y="30" font-family="Inter, sans-serif" font-size="11" fill="#b3411f">✗ Pending</text>
    </g>
  </g>

  <!-- Annotation -->
  <g transform="translate(80 540)">
    <rect width="600" height="60" rx="10" fill="#0d0b06"/>
    <text x="16" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="1.4" fill="#f49a16">BALANCE DISPLAYED CLEARLY</text>
    <text x="16" y="44" font-family="Inter, sans-serif" font-size="11" fill="#f7f6f3">Tile + wallet menu + auto-refresh on connect · Level 1 req. 3</text>
  </g>
</svg>
