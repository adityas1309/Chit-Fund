name: Susu / Chit Fund CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  contracts:
    name: Rust contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts -> target

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli --version 21.0.0

      - name: Lint
        working-directory: contracts
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Format check
        working-directory: contracts
        run: cargo fmt --all -- --check

      - name: Test
        working-directory: contracts
        run: cargo test --workspace

      - name: Build WASM (penalty_handler)
        working-directory: contracts
        run: cargo build --target wasm32v1-none --release -p penalty_handler

      - name: Build WASM (savings_circle)
        working-directory: contracts
        run: cargo build --target wasm32v1-none --release -p savings_circle

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wasm
          path: |
            contracts/target/wasm32v1-none/release/penalty_handler.wasm
            contracts/target/wasm32v1-none/release/savings_circle.wasm

  frontend:
    name: React frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Test
        working-directory: frontend
        run: npm test -- --reporter=verbose

      - name: Build
        working-directory: frontend
        env:
          VITE_SAVINGS_CIRCLE_CONTRACT_ID: ${{ secrets.SAVINGS_CIRCLE_CONTRACT_ID || '' }}
          VITE_PENALTY_HANDLER_CONTRACT_ID: ${{ secrets.PENALTY_HANDLER_CONTRACT_ID || '' }}
          VITE_CIRCLE_TOKEN_CONTRACT_ID: ${{ secrets.CIRCLE_TOKEN_CONTRACT_ID || '' }}
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist

  deploy-testnet:
    name: Deploy to Stellar Testnet
    needs: [contracts, frontend]
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check deploy secret
        id: deploy_config
        run: |
          if [ -n "$SOROBAN_SECRET_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          SOROBAN_SECRET_KEY: ${{ secrets.SOROBAN_SECRET_KEY }}

      - name: Install Rust
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32v1-none

      - name: Install Soroban CLI
        if: steps.deploy_config.outputs.enabled == 'true'
        run: cargo install --locked soroban-cli --version 21.0.0

      - name: Download WASM
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: actions/download-artifact@v8
        with:
          name: wasm
          path: artifacts

      - name: Configure Soroban identity
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          echo "${{ secrets.SOROBAN_SECRET_KEY }}" | soroban keys add deployer --secret-key -

      - name: Deploy penalty_handler
        if: steps.deploy_config.outputs.enabled == 'true'
        working-directory: artifacts
        run: |
          ID=$(soroban contract deploy \
            --wasm penalty_handler.wasm \
            --source deployer \
            --network testnet)
          echo "PENALTY_ID=$ID" >> $GITHUB_ENV
          echo "Penalty contract deployed: $ID"
          echo "$ID" > penalty_address.txt

      - name: Deploy savings_circle
        if: steps.deploy_config.outputs.enabled == 'true'
        working-directory: artifacts
        run: |
          ID=$(soroban contract deploy \
            --wasm savings_circle.wasm \
            --source deployer \
            --network testnet)
          echo "SAVINGS_ID=$ID" >> $GITHUB_ENV
          echo "Savings circle contract deployed: $ID"
          echo "$ID" > savings_address.txt

      - name: Upload deployment addresses
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: deployment-addresses
          path: artifacts/*.txt
