name: Vercel Deploy (Frontend)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_SAVINGS_CIRCLE_CONTRACT_ID: ${{ secrets.SAVINGS_CIRCLE_CONTRACT_ID }}
          VITE_PENALTY_HANDLER_CONTRACT_ID: ${{ secrets.PENALTY_HANDLER_CONTRACT_ID }}
          VITE_CIRCLE_TOKEN_CONTRACT_ID: ${{ secrets.CIRCLE_TOKEN_CONTRACT_ID }}
        run: npm run build

      - name: Deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
